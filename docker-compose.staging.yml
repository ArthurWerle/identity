services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-identity-postgres-staging}
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - identity-network

  identity:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${SERVICE_CONTAINER_NAME:-identity-staging}
    env_file:
      - stack.env
    environment:
      APP_ENV: ${APP_ENV:-staging}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SERVER_PORT: ${SERVER_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SESSION_DURATION_HOURS: ${SESSION_DURATION_HOURS:-720}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "${SERVICE_PORT:-9083}:${SERVER_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - identity-network
      - staging_bff_back-end
      - financer-transactions_transactions-network

volumes:
  postgres_data_staging:

networks:
  identity-network:
    driver: bridge
  staging_bff_back-end:
    external: true
  financer-transactions_transactions-network:
    external: true
